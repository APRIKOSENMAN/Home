<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- AUTH SECTION -->
  <div id="auth-section">
    <div class="card" id="login-box">
      <h2>Anmelden</h2>
      <input type="text" id="login-user" placeholder="Benutzername" />
      <input type="password" id="login-pass" placeholder="Passwort" />
      <button onclick="login()">Einloggen</button>
      <p class="error" id="login-error"></p>
      <p class="switch">Noch kein Konto? <a href="#" onclick="showRegister()">Registrieren</a></p>
    </div>

    <div class="card hidden" id="register-box">
      <h2>Registrieren</h2>
      <input type="text" id="reg-user" placeholder="Benutzername" />
      <input type="password" id="reg-pass" placeholder="Passwort (min. 6 Zeichen)" />
      <input type="password" id="reg-pass2" placeholder="Passwort wiederholen" />
      <button onclick="register()">Registrieren</button>
      <p class="error" id="reg-error"></p>
      <p class="switch">Schon registriert? <a href="#" onclick="showLogin()">Anmelden</a></p>
    </div>
  </div>

  <!-- APP SECTION -->
  <div id="app-section" class="hidden">
    <header>
      <span class="logo">Home</span>
      <nav>
        <a href="#board" class="nav-link">Board</a>
        <a href="#profile" class="nav-link">Profil</a>
      </nav>
      <button class="logout-btn" onclick="logout()">Abmelden</button>
    </header>

    <main>

      <!-- Board -->
      <div id="view-board" class="view hidden">
        <div class="write-box">
          <h3>Neuen Beitrag schreiben</h3>
          <input type="text" id="post-title" placeholder="Titel" />
          <textarea id="post-body" placeholder="Inhalt..."></textarea>
          <button onclick="submitPost()">Veröffentlichen</button>
        </div>
        <h3 class="section-title">Alle Beiträge</h3>
        <div id="posts-container"></div>
      </div>

      <!-- Profil -->
      <div id="view-profile" class="view hidden">
        <div class="profile-header">
          <div class="profile-avatar" id="profile-avatar"></div>
          <div class="profile-info">
            <h2 id="profile-username"></h2>
            <p id="profile-meta"></p>
          </div>
        </div>
        <h3 class="section-title">Beiträge</h3>
        <div id="profile-posts-container"></div>
      </div>

    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
